version: '3.8'
services:
  openclaw:
    build: .
    ports:
      - "18789:18789"
    container_name: openclaw-sandbox
    env_file:
      - .env
    volumes:
      - .:/workspace              # Hier arbeitet der Agent
      - ./config:/root/.openclaw  # Hier liegen deine Einstellungen
    environment:
      - OPENCLAW_GATEWAY_HOST=0.0.0.0
      - OPENCLAW_GATEWAY_PORT=18789
    restart: no